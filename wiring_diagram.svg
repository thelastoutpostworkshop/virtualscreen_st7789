<svg width="1500" height="860" viewBox="0 0 1500 860" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ESP32-S3 to five ST7789 TFT wiring diagram</title>
  <desc id="desc">A simplified wiring diagram. One shared bus carries 3.3 V, ground, SCK, MOSI, DC, reset, and backlight to all five ST7789 displays. Each display has its own chip select line.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #c7d2e1; stroke-width: 2; }
      .board { fill: #172554; stroke: #0f172a; stroke-width: 3; }
      .hub { fill: #eef6ff; stroke: #60a5fa; stroke-width: 2; }
      .screen { fill: #111827; stroke: #374151; stroke-width: 3; }
      .glass { fill: #0f766e; stroke: #5eead4; stroke-width: 2; }
      .note { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .title { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; font-size: 22px; font-weight: 700; }
      .label { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; font-size: 18px; font-weight: 700; }
      .small { font-family: Arial, Helvetica, sans-serif; fill: #334155; font-size: 15px; }
      .tiny { font-family: Arial, Helvetica, sans-serif; fill: #475569; font-size: 13px; }
      .white { font-family: Arial, Helvetica, sans-serif; fill: #ffffff; font-size: 20px; font-weight: 700; }
      .pin-label { font-family: Arial, Helvetica, sans-serif; fill: #e2e8f0; font-size: 14px; }
      .screen-title { font-family: Arial, Helvetica, sans-serif; fill: #ffffff; font-size: 18px; font-weight: 700; }
      .screen-pin { font-family: Arial, Helvetica, sans-serif; fill: #e5e7eb; font-size: 13px; }
      .wire { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .bus { stroke: #64748b; stroke-width: 12; }
      .bus-tap { stroke: #64748b; stroke-width: 7; }
      .cs { stroke: #059669; stroke-width: 4; }
      .pin { fill: #ffffff; stroke: #0f172a; stroke-width: 2; }
      .bus-dot { fill: #64748b; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="860"/>
  <rect class="card" x="24" y="24" width="1452" height="812" rx="18"/>

  <text class="title" x="750" y="62" text-anchor="middle">ESP32-S3 shared SPI wiring for five 240x240 ST7789 displays</text>
  <text class="small" x="750" y="90" text-anchor="middle">The shared bus goes to every display. The green CS lines select one display at a time.</text>

  <!-- ESP32-S3 board -->
  <rect class="board" x="60" y="145" width="300" height="575" rx="22"/>
  <text class="white" x="210" y="188" text-anchor="middle">ESP32-S3</text>
  <text class="pin-label" x="210" y="215" text-anchor="middle">Dev board with PSRAM</text>

  <text class="pin-label" x="88" y="260">Shared bus pins</text>
  <text class="pin-label" x="88" y="285">3V3, GND</text>
  <text class="pin-label" x="88" y="310">GPIO36 -> TFT SCL/SCK</text>
  <text class="pin-label" x="88" y="335">GPIO35 -> TFT SDA/MOSI</text>
  <text class="pin-label" x="88" y="360">GPIO41 -> TFT DC</text>
  <text class="pin-label" x="88" y="385">GPIO42 -> TFT RES/RST</text>
  <circle class="pin" cx="360" cy="325" r="8"/>

  <text class="pin-label" x="88" y="456">GPIO25  CS screen 1</text>
  <text class="pin-label" x="88" y="501">GPIO12  CS screen 2</text>
  <text class="pin-label" x="88" y="546">GPIO17  CS screen 3</text>
  <text class="pin-label" x="88" y="591">GPIO13  CS screen 4</text>
  <text class="pin-label" x="88" y="636">GPIO26  CS screen 5</text>
  <circle class="pin" cx="360" cy="450" r="8"/>
  <circle class="pin" cx="360" cy="495" r="8"/>
  <circle class="pin" cx="360" cy="540" r="8"/>
  <circle class="pin" cx="360" cy="585" r="8"/>
  <circle class="pin" cx="360" cy="630" r="8"/>

  <rect x="150" y="668" width="120" height="34" rx="7" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
  <text class="pin-label" x="210" y="691" text-anchor="middle">USB</text>

  <!-- Shared bus hub -->
  <rect class="hub" x="430" y="205" width="330" height="155" rx="14"/>
  <text class="label" x="595" y="236" text-anchor="middle">shared bus</text>
  <text class="small" x="455" y="267">3V3 + TFT BL</text>
  <text class="small" x="455" y="292">GND</text>
  <text class="small" x="455" y="317">GPIO36 -> TFT SCL/SCK</text>
  <text class="small" x="455" y="342">GPIO35 -> TFT SDA/MOSI</text>
  <text class="small" x="615" y="267">GPIO41 -> TFT DC</text>
  <text class="small" x="615" y="292">GPIO42 -> TFT RES/RST</text>

  <path class="wire bus" d="M360 325 H430"/>
  <path class="wire bus" d="M760 282 H980"/>
  <path class="wire bus" d="M980 155 V700"/>
  <text class="tiny" x="865" y="266" text-anchor="middle">one shared bundle</text>

  <!-- TFT modules -->
  <g transform="translate(1060 105)">
    <rect class="screen" x="0" y="0" width="380" height="105" rx="14"/>
    <rect class="glass" x="188" y="24" width="160" height="58" rx="7"/>
    <text class="screen-title" x="268" y="60" text-anchor="middle">TFT 1</text>
    <text class="screen-pin" x="26" y="36">shared bus pins</text>
    <text class="screen-pin" x="26" y="61">VCC GND SCL SDA DC RES BL</text>
    <text class="screen-pin" x="26" y="88">CS</text>
  </g>
  <g transform="translate(1060 235)">
    <rect class="screen" x="0" y="0" width="380" height="105" rx="14"/>
    <rect class="glass" x="188" y="24" width="160" height="58" rx="7"/>
    <text class="screen-title" x="268" y="60" text-anchor="middle">TFT 2</text>
    <text class="screen-pin" x="26" y="36">shared bus pins</text>
    <text class="screen-pin" x="26" y="61">VCC GND SCL SDA DC RES BL</text>
    <text class="screen-pin" x="26" y="88">CS</text>
  </g>
  <g transform="translate(1060 365)">
    <rect class="screen" x="0" y="0" width="380" height="105" rx="14"/>
    <rect class="glass" x="188" y="24" width="160" height="58" rx="7"/>
    <text class="screen-title" x="268" y="60" text-anchor="middle">TFT 3</text>
    <text class="screen-pin" x="26" y="36">shared bus pins</text>
    <text class="screen-pin" x="26" y="61">VCC GND SCL SDA DC RES BL</text>
    <text class="screen-pin" x="26" y="88">CS</text>
  </g>
  <g transform="translate(1060 495)">
    <rect class="screen" x="0" y="0" width="380" height="105" rx="14"/>
    <rect class="glass" x="188" y="24" width="160" height="58" rx="7"/>
    <text class="screen-title" x="268" y="60" text-anchor="middle">TFT 4</text>
    <text class="screen-pin" x="26" y="36">shared bus pins</text>
    <text class="screen-pin" x="26" y="61">VCC GND SCL SDA DC RES BL</text>
    <text class="screen-pin" x="26" y="88">CS</text>
  </g>
  <g transform="translate(1060 625)">
    <rect class="screen" x="0" y="0" width="380" height="105" rx="14"/>
    <rect class="glass" x="188" y="24" width="160" height="58" rx="7"/>
    <text class="screen-title" x="268" y="60" text-anchor="middle">TFT 5</text>
    <text class="screen-pin" x="26" y="36">shared bus pins</text>
    <text class="screen-pin" x="26" y="61">VCC GND SCL SDA DC RES BL</text>
    <text class="screen-pin" x="26" y="88">CS</text>
  </g>

  <!-- Shared bus taps -->
  <circle class="bus-dot" cx="980" cy="158" r="7"/>
  <circle class="bus-dot" cx="980" cy="288" r="7"/>
  <circle class="bus-dot" cx="980" cy="418" r="7"/>
  <circle class="bus-dot" cx="980" cy="548" r="7"/>
  <circle class="bus-dot" cx="980" cy="678" r="7"/>
  <path class="wire bus-tap" d="M980 158 H1060"/>
  <path class="wire bus-tap" d="M980 288 H1060"/>
  <path class="wire bus-tap" d="M980 418 H1060"/>
  <path class="wire bus-tap" d="M980 548 H1060"/>
  <path class="wire bus-tap" d="M980 678 H1060"/>

  <!-- Per-screen chip select lines -->
  <path class="wire cs" d="M360 450 H815 V193 H1060"/>
  <path class="wire cs" d="M360 495 H850 V323 H1060"/>
  <path class="wire cs" d="M360 540 H885 V453 H1060"/>
  <path class="wire cs" d="M360 585 H920 V583 H1060"/>
  <path class="wire cs" d="M360 630 H955 V713 H1060"/>

  <text class="tiny" x="825" y="188">CS1 GPIO25</text>
  <text class="tiny" x="860" y="318">CS2 GPIO12</text>
  <text class="tiny" x="895" y="448">CS3 GPIO17</text>
  <text class="tiny" x="930" y="578">CS4 GPIO13</text>
  <text class="tiny" x="965" y="708">CS5 GPIO26</text>

  <!-- Notes and legend outside wire area -->
  <rect class="note" x="75" y="758" width="1350" height="52" rx="10"/>
  <line class="wire bus-tap" x1="105" y1="784" x2="170" y2="784"/>
  <text class="tiny" x="185" y="789">shared bus: 3V3, GND, SCL/SCK, SDA/MOSI, DC, RES/RST, BL</text>
  <line class="wire cs" x1="625" y1="784" x2="690" y2="784"/>
  <text class="tiny" x="705" y="789">individual chip select lines</text>
  <text class="tiny" x="1010" y="789">Use 3.3 V logic. If using a separate display supply, connect grounds together.</text>
</svg>
