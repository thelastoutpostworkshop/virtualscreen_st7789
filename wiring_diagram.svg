<svg width="1500" height="950" viewBox="0 0 1500 950" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ESP32-S3 to five ST7789 TFT wiring diagram</title>
  <desc id="desc">Five 1.54 inch ST7789 SPI displays share 3V3, GND, SCK, MOSI, DC, and RST. Each display has a separate CS line.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .card { fill: #ffffff; stroke: #c7d2e1; stroke-width: 2; }
      .board { fill: #172554; stroke: #0f172a; stroke-width: 3; }
      .screen { fill: #111827; stroke: #374151; stroke-width: 3; }
      .glass { fill: #0f766e; stroke: #5eead4; stroke-width: 2; }
      .label { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; font-size: 20px; }
      .small { font-family: Arial, Helvetica, sans-serif; fill: #334155; font-size: 15px; }
      .tiny { font-family: Arial, Helvetica, sans-serif; fill: #475569; font-size: 13px; }
      .white { font-family: Arial, Helvetica, sans-serif; fill: #ffffff; font-size: 20px; font-weight: 700; }
      .screen-title { font-family: Arial, Helvetica, sans-serif; fill: #ffffff; font-size: 18px; font-weight: 700; }
      .screen-pin { font-family: Arial, Helvetica, sans-serif; fill: #e5e7eb; font-size: 13px; }
      .pin-label { font-family: Arial, Helvetica, sans-serif; fill: #e2e8f0; font-size: 15px; }
      .wire { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .wire-thin { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .vcc { stroke: #dc2626; }
      .gnd { stroke: #111827; }
      .sck { stroke: #f97316; }
      .mosi { stroke: #eab308; }
      .dc { stroke: #2563eb; }
      .rst { stroke: #7c3aed; }
      .cs { stroke: #059669; }
      .pin { fill: #ffffff; stroke: #0f172a; stroke-width: 2; }
      .legend-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="950"/>
  <rect class="card" x="24" y="24" width="1452" height="902" rx="18"/>

  <text class="label" x="750" y="60" text-anchor="middle" font-weight="700">ESP32-S3 shared SPI wiring for five 240x240 ST7789 displays</text>
  <text class="small" x="750" y="88" text-anchor="middle">TFT pins marked SCL and SDA are SPI clock and SPI MOSI, not I2C.</text>

  <!-- ESP32-S3 board -->
  <rect class="board" x="55" y="155" width="280" height="650" rx="22"/>
  <text class="white" x="195" y="195" text-anchor="middle">ESP32-S3</text>
  <text class="pin-label" x="195" y="222" text-anchor="middle">Dev board with PSRAM</text>
  <rect x="140" y="740" width="110" height="36" rx="8" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
  <text class="pin-label" x="195" y="764" text-anchor="middle">USB</text>

  <!-- ESP32 pins -->
  <g>
    <circle class="pin" cx="335" cy="250" r="8"/><text class="pin-label" x="80" y="256">3V3</text>
    <circle class="pin" cx="335" cy="292" r="8"/><text class="pin-label" x="80" y="298">GND</text>
    <circle class="pin" cx="335" cy="344" r="8"/><text class="pin-label" x="80" y="350">GPIO36  TFT_SCK</text>
    <circle class="pin" cx="335" cy="386" r="8"/><text class="pin-label" x="80" y="392">GPIO35  TFT_MOSI</text>
    <circle class="pin" cx="335" cy="428" r="8"/><text class="pin-label" x="80" y="434">GPIO41  TFT_DC</text>
    <circle class="pin" cx="335" cy="470" r="8"/><text class="pin-label" x="80" y="476">GPIO42  TFT_RST</text>
    <circle class="pin" cx="335" cy="550" r="8"/><text class="pin-label" x="80" y="556">GPIO25  CS screen 1</text>
    <circle class="pin" cx="335" cy="592" r="8"/><text class="pin-label" x="80" y="598">GPIO12  CS screen 2</text>
    <circle class="pin" cx="335" cy="634" r="8"/><text class="pin-label" x="80" y="640">GPIO17  CS screen 3</text>
    <circle class="pin" cx="335" cy="676" r="8"/><text class="pin-label" x="80" y="682">GPIO13  CS screen 4</text>
    <circle class="pin" cx="335" cy="718" r="8"/><text class="pin-label" x="80" y="724">GPIO26  CS screen 5</text>
  </g>

  <!-- Shared bus rails -->
  <text class="small" x="514" y="130" text-anchor="middle" font-weight="700">shared by all displays</text>
  <line class="wire vcc" x1="430" y1="130" x2="430" y2="890"/>
  <line class="wire gnd" x1="465" y1="130" x2="465" y2="890"/>
  <line class="wire sck" x1="500" y1="130" x2="500" y2="890"/>
  <line class="wire mosi" x1="535" y1="130" x2="535" y2="890"/>
  <line class="wire dc" x1="570" y1="130" x2="570" y2="890"/>
  <line class="wire rst" x1="605" y1="130" x2="605" y2="890"/>

  <text class="tiny" x="430" y="116" text-anchor="middle">3V3 + BLK</text>
  <text class="tiny" x="465" y="116" text-anchor="middle">GND</text>
  <text class="tiny" x="500" y="116" text-anchor="middle">SCL</text>
  <text class="tiny" x="535" y="116" text-anchor="middle">SDA</text>
  <text class="tiny" x="570" y="116" text-anchor="middle">DC</text>
  <text class="tiny" x="605" y="116" text-anchor="middle">RES</text>

  <!-- ESP32 pins to shared rails -->
  <path class="wire vcc" d="M335 250 H430"/>
  <path class="wire gnd" d="M335 292 H465"/>
  <path class="wire sck" d="M335 344 H500"/>
  <path class="wire mosi" d="M335 386 H535"/>
  <path class="wire dc" d="M335 428 H570"/>
  <path class="wire rst" d="M335 470 H605"/>

  <!-- TFT modules -->
  <g id="tft1" transform="translate(1000 50)">
    <rect class="screen" x="0" y="0" width="420" height="155" rx="14"/>
    <rect class="glass" x="184" y="34" width="204" height="94" rx="7"/>
    <text class="screen-title" x="286" y="84" text-anchor="middle">TFT 1</text>
    <text class="screen-pin" x="26" y="40">VCC + BLK</text>
    <text class="screen-pin" x="26" y="59">GND</text>
    <text class="screen-pin" x="26" y="78">SCL</text>
    <text class="screen-pin" x="26" y="97">SDA</text>
    <text class="screen-pin" x="26" y="116">DC</text>
    <text class="screen-pin" x="26" y="135">RES</text>
    <text class="screen-pin" x="26" y="150">CS</text>
  </g>
  <g id="tft2" transform="translate(1000 220)">
    <rect class="screen" x="0" y="0" width="420" height="155" rx="14"/>
    <rect class="glass" x="184" y="34" width="204" height="94" rx="7"/>
    <text class="screen-title" x="286" y="84" text-anchor="middle">TFT 2</text>
    <text class="screen-pin" x="26" y="40">VCC + BLK</text>
    <text class="screen-pin" x="26" y="59">GND</text>
    <text class="screen-pin" x="26" y="78">SCL</text>
    <text class="screen-pin" x="26" y="97">SDA</text>
    <text class="screen-pin" x="26" y="116">DC</text>
    <text class="screen-pin" x="26" y="135">RES</text>
    <text class="screen-pin" x="26" y="150">CS</text>
  </g>
  <g id="tft3" transform="translate(1000 390)">
    <rect class="screen" x="0" y="0" width="420" height="155" rx="14"/>
    <rect class="glass" x="184" y="34" width="204" height="94" rx="7"/>
    <text class="screen-title" x="286" y="84" text-anchor="middle">TFT 3</text>
    <text class="screen-pin" x="26" y="40">VCC + BLK</text>
    <text class="screen-pin" x="26" y="59">GND</text>
    <text class="screen-pin" x="26" y="78">SCL</text>
    <text class="screen-pin" x="26" y="97">SDA</text>
    <text class="screen-pin" x="26" y="116">DC</text>
    <text class="screen-pin" x="26" y="135">RES</text>
    <text class="screen-pin" x="26" y="150">CS</text>
  </g>
  <g id="tft4" transform="translate(1000 560)">
    <rect class="screen" x="0" y="0" width="420" height="155" rx="14"/>
    <rect class="glass" x="184" y="34" width="204" height="94" rx="7"/>
    <text class="screen-title" x="286" y="84" text-anchor="middle">TFT 4</text>
    <text class="screen-pin" x="26" y="40">VCC + BLK</text>
    <text class="screen-pin" x="26" y="59">GND</text>
    <text class="screen-pin" x="26" y="78">SCL</text>
    <text class="screen-pin" x="26" y="97">SDA</text>
    <text class="screen-pin" x="26" y="116">DC</text>
    <text class="screen-pin" x="26" y="135">RES</text>
    <text class="screen-pin" x="26" y="150">CS</text>
  </g>
  <g id="tft5" transform="translate(1000 730)">
    <rect class="screen" x="0" y="0" width="420" height="155" rx="14"/>
    <rect class="glass" x="184" y="34" width="204" height="94" rx="7"/>
    <text class="screen-title" x="286" y="84" text-anchor="middle">TFT 5</text>
    <text class="screen-pin" x="26" y="40">VCC + BLK</text>
    <text class="screen-pin" x="26" y="59">GND</text>
    <text class="screen-pin" x="26" y="78">SCL</text>
    <text class="screen-pin" x="26" y="97">SDA</text>
    <text class="screen-pin" x="26" y="116">DC</text>
    <text class="screen-pin" x="26" y="135">RES</text>
    <text class="screen-pin" x="26" y="150">CS</text>
  </g>

  <!-- Shared branches to displays -->
  <g>
    <!-- TFT 1 -->
    <path class="wire-thin vcc" d="M430 88 H1000"/><path class="wire-thin gnd" d="M465 107 H1000"/><path class="wire-thin sck" d="M500 126 H1000"/><path class="wire-thin mosi" d="M535 145 H1000"/><path class="wire-thin dc" d="M570 164 H1000"/><path class="wire-thin rst" d="M605 183 H1000"/>
    <!-- TFT 2 -->
    <path class="wire-thin vcc" d="M430 258 H1000"/><path class="wire-thin gnd" d="M465 277 H1000"/><path class="wire-thin sck" d="M500 296 H1000"/><path class="wire-thin mosi" d="M535 315 H1000"/><path class="wire-thin dc" d="M570 334 H1000"/><path class="wire-thin rst" d="M605 353 H1000"/>
    <!-- TFT 3 -->
    <path class="wire-thin vcc" d="M430 428 H1000"/><path class="wire-thin gnd" d="M465 447 H1000"/><path class="wire-thin sck" d="M500 466 H1000"/><path class="wire-thin mosi" d="M535 485 H1000"/><path class="wire-thin dc" d="M570 504 H1000"/><path class="wire-thin rst" d="M605 523 H1000"/>
    <!-- TFT 4 -->
    <path class="wire-thin vcc" d="M430 598 H1000"/><path class="wire-thin gnd" d="M465 617 H1000"/><path class="wire-thin sck" d="M500 636 H1000"/><path class="wire-thin mosi" d="M535 655 H1000"/><path class="wire-thin dc" d="M570 674 H1000"/><path class="wire-thin rst" d="M605 693 H1000"/>
    <!-- TFT 5 -->
    <path class="wire-thin vcc" d="M430 768 H1000"/><path class="wire-thin gnd" d="M465 787 H1000"/><path class="wire-thin sck" d="M500 806 H1000"/><path class="wire-thin mosi" d="M535 825 H1000"/><path class="wire-thin dc" d="M570 844 H1000"/><path class="wire-thin rst" d="M605 863 H1000"/>
  </g>

  <!-- Per-screen chip select lines -->
  <path class="wire cs" d="M335 550 H720 V199 H1000"/>
  <path class="wire cs" d="M335 592 H760 V369 H1000"/>
  <path class="wire cs" d="M335 634 H800 V539 H1000"/>
  <path class="wire cs" d="M335 676 H840 V709 H1000"/>
  <path class="wire cs" d="M335 718 H880 V879 H1000"/>

  <text class="tiny" x="742" y="194">CS1 GPIO25</text>
  <text class="tiny" x="782" y="364">CS2 GPIO12</text>
  <text class="tiny" x="822" y="534">CS3 GPIO17</text>
  <text class="tiny" x="862" y="704">CS4 GPIO13</text>
  <text class="tiny" x="902" y="874">CS5 GPIO26</text>

  <!-- Legend -->
  <rect class="legend-box" x="650" y="122" width="285" height="160" rx="10"/>
  <text class="small" x="792" y="148" text-anchor="middle" font-weight="700">Wire colors</text>
  <line class="wire-thin vcc" x1="675" y1="172" x2="725" y2="172"/><text class="tiny" x="740" y="177">3V3 and BLK</text>
  <line class="wire-thin gnd" x1="675" y1="194" x2="725" y2="194"/><text class="tiny" x="740" y="199">GND</text>
  <line class="wire-thin sck" x1="675" y1="216" x2="725" y2="216"/><text class="tiny" x="740" y="221">SCL / SCK</text>
  <line class="wire-thin mosi" x1="675" y1="238" x2="725" y2="238"/><text class="tiny" x="740" y="243">SDA / MOSI</text>
  <line class="wire-thin dc" x1="675" y1="260" x2="725" y2="260"/><text class="tiny" x="740" y="265">DC</text>
  <line class="wire-thin rst" x1="810" y1="216" x2="860" y2="216"/><text class="tiny" x="875" y="221">RES / RST</text>
  <line class="wire-thin cs" x1="810" y1="238" x2="860" y2="238"/><text class="tiny" x="875" y="243">CS per display</text>

  <text class="tiny" x="750" y="914" text-anchor="middle">Use 3.3 V logic. If a separate 3.3 V display supply is used, connect its GND to ESP32-S3 GND.</text>
</svg>
